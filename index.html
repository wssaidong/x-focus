<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus — Brutalist</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f0;
      --ink: #0a0a0a;
      --accent: #ff3300;
      --accent2: #0000ff;
      --card: #ffffff;
      --border: #0a0a0a;
      --shadow: 4px 4px 0 var(--ink);
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.5;
      min-height: 100vh;
    }

    ::selection { background: var(--accent); color: #fff; }

    /* Header */
    header {
      background: var(--ink);
      color: #fff;
      padding: 0 24px;
      border-bottom: 4px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 64px;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -1px;
      text-transform: uppercase;
      border: 3px solid #fff;
      padding: 2px 10px;
      line-height: 1;
    }

    .logo span { color: var(--accent); }

    .search-wrap { flex: 1; max-width: 320px; }

    #search {
      width: 100%;
      background: #222;
      border: 2px solid #fff;
      color: #fff;
      font-family: inherit;
      font-size: 0.9rem;
      padding: 8px 12px;
      outline: none;
    }

    #search::placeholder { color: #888; }

    .header-count {
      margin-left: auto;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Filter */
    .filter-bar {
      background: var(--ink);
      border-bottom: 3px solid var(--ink);
    }

    .filter-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 0;
      overflow-x: auto;
    }

    .filter-btn {
      background: none;
      border: none;
      border-right: 2px solid #333;
      color: #888;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 14px 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.1s, background 0.1s;
    }

    .filter-btn:hover { color: #fff; background: #222; }
    .filter-btn.active { color: var(--accent); background: #111; }

    /* Main */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px; }

    /* Grid */
    .feed {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 3px;
    }

    .item {
      background: var(--card);
      border: 3px solid var(--ink);
      padding: 24px;
      grid-column: span 4;
      cursor: pointer;
      transition: box-shadow 0.1s, transform 0.1s;
      position: relative;
    }

    .item:hover {
      box-shadow: var(--shadow);
      transform: translate(-2px, -2px);
    }

    .item.featured { grid-column: span 8; border-color: var(--accent); }
    .item.secondary { grid-column: span 6; }

    /* Index number */
    .item-index {
      font-size: 3.5rem;
      font-weight: 700;
      color: #eee;
      line-height: 1;
      position: absolute;
      top: 16px;
      right: 20px;
      letter-spacing: -4px;
    }

    .item:hover .item-index { color: var(--accent); }

    /* Source */
    .item-src {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      display: inline-block;
      background: var(--ink);
      color: #fff;
      padding: 3px 8px;
    }

    .src-36kr { background: #e63900; }
    .src-v2ex { background: #1d3b6e; }
    .src-stackoverflow { background: #c2682a; }
    .src-tieba { background: #7a6600; color: #fff; }
    .src-lobsters { background: #8c2e1a; }

    /* Title */
    .item-title {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 14px;
      color: var(--ink);
    }

    .item.featured .item-title { font-size: 1.3rem; }
    .item a { color: inherit; text-decoration: none; }
    .item a:hover { text-decoration: underline; text-decoration-color: var(--accent); text-decoration-thickness: 3px; }

    /* Meta */
    .item-meta {
      display: flex;
      gap: 16px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .vote { color: var(--accent); }
    .item:hover .vote { color: var(--ink); }

    /* Tags */
    .item-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 12px; }

    .tag {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border: 2px solid var(--ink);
    }

    .item:hover .tag { background: var(--ink); color: #fff; }

    /* Empty */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px;
      font-size: 1.5rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ccc;
    }

    /* Footer bar */
    .footer-bar {
      background: var(--ink);
      color: #888;
      padding: 16px 24px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      gap: 24px;
      overflow-x: auto;
    }

    .footer-bar span { white-space: nowrap; }
    .footer-bar span::before { content: '// '; color: var(--accent); }

    /* Responsive */
    @media (max-width: 900px) {
      .item { grid-column: span 6; }
      .item.featured { grid-column: span 12; }
    }
    @media (max-width: 600px) {
      .item { grid-column: span 12; }
      .item.featured { grid-column: span 12; }
      main { padding: 16px 12px 60px; }
    }

    /* Entrance */
    .item {
      opacity: 0;
      transform: translateY(16px);
      animation: up 0.3s ease forwards;
    }
    @keyframes up { to { opacity: 1; transform: translateY(0); } }
    .item:nth-child(1){animation-delay:0.05s}
    .item:nth-child(2){animation-delay:0.1s}
    .item:nth-child(3){animation-delay:0.15s}
    .item:nth-child(4){animation-delay:0.2s}
    .item:nth-child(5){animation-delay:0.25s}
    .item:nth-child(6){animation-delay:0.3s}
    .item:nth-child(7){animation-delay:0.35s}
    .item:nth-child(8){animation-delay:0.4s}
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">FOCUS<span>.</span></div>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="SEARCH..." autocomplete="off" spellcheck="false">
    </div>
    <div class="header-count"><span id="item-count">0</span> ITEMS</div>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-inner" id="filter-bar"></div>
</div>

<main>
  <div class="feed" id="feed"></div>
</main>

<div class="footer-bar">
  <span>Focus v3.0 — Neo-Brutalist</span>
  <span>AGENTS.ML</span>
  <span>OPEN SOURCE</span>
</div>

<script>
const SOURCES = [
  { id: '36kr',     label: '36Kr',         color: '#e63900', url: '36kr.json' },
  { id: 'v2ex',     label: 'V2EX',         color: '#1d3b6e', url: 'v2ex.json' },
  { id: 'stackoverflow', label: 'StackOverflow', color: '#c2682a', url: 'stackoverflow.json' },
  { id: 'tieba',    label: '贴吧',          color: '#7a6600', url: 'tieba.json' },
  { id: 'lobsters', label: 'Lobsters',      color: '#8c2e1a', url: 'lobsters.json' },
];

const state = { items: [], activeSource: 'all', search: '' };

async function load() {
  const all = await Promise.all(SOURCES.map(s => fetch(s.url).then(r => r.json()).catch(() => [])));
  state.items = all.flat();
  state.items.sort((a, b) => new Date(b.time) - new Date(a.time));
  render();
}

function renderFilters() {
  const counts = {};
  state.items.forEach(i => counts[i.source] = (counts[i.source] || 0) + 1);
  const bar = document.getElementById('filter-bar');
  bar.innerHTML = [
    { id: 'all', label: 'All', count: state.items.length },
    ...SOURCES.map(s => ({ id: s.id, label: s.label, count: counts[s.id] || 0 }))
  ].map(f => `<button class="filter-btn${f.id==='all'?' active':''}" data-src="${f.id}">${f.label} (${f.count})</button>`).join('');
  bar.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.activeSource = btn.dataset.src;
      render();
    };
  });
}

function render() {
  document.getElementById('item-count').textContent = filtered().length;
  renderFilters();
  const feed = document.getElementById('feed');
  const list = filtered().slice(0, 40);
  if (!list.length) { feed.innerHTML = '<div class="empty">NO RESULTS</div>'; return; }
  feed.innerHTML = list.map((item, i) => {
    const src = SOURCES.find(s => s.id === item.source) || SOURCES[0];
    const n = String(i + 1).padStart(2, '0');
    const tags = (item.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');
    const cls = i === 0 ? 'featured' : i === 1 ? 'secondary' : '';
    return `<div class="item ${cls}" onclick="window.open('${item.url}','_blank')">
      <div class="item-index">${n}</div>
      <div class="item-src src-${item.source}">${src.label}</div>
      <div class="item-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></div>
      <div class="item-meta">
        ${item.votes ? `<span class="vote">▲ ${item.votes}</span>` : ''}
        ${item.comments ? `<span>💬 ${item.comments}</span>` : ''}
        ${item.author ? `<span>@${item.author}</span>` : ''}
        ${item.time ? `<span>${timeAgo(item.time)}</span>` : ''}
      </div>
      ${tags ? `<div class="item-tags">${tags}</div>` : ''}
    </div>`;
  }).join('');
}

function filtered() {
  return state.items.filter(item => {
    const matchSrc = state.activeSource === 'all' || item.source === state.activeSource;
    const q = state.search.toLowerCase();
    const matchSearch = !q || [item.title, item.author, ...(item.tags||[])].some(f => (f||'').toLowerCase().includes(q));
    return matchSrc && matchSearch;
  });
}

function timeAgo(ts) {
  const d = new Date(ts), now = new Date(), diff = Math.floor((now-d)/1000);
  if (diff < 60) return diff+'s';
  if (diff < 3600) return Math.floor(diff/60)+'m';
  if (diff < 86400) return Math.floor(diff/3600)+'h';
  if (diff < 604800) return Math.floor(diff/86400)+'d';
  return d.toLocaleDateString('zh-CN', {month:'short',day:'numeric'});
}

let t;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(t);
  t = setTimeout(() => { state.search = e.target.value; render(); }, 200);
});

load();
</script>
</body>
</html>
