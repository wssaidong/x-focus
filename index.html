<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus — 每日文摘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page: #F7F5F0;
      --bg-card: #FFFFFF;
      --bg-card-hover: #FAFAFA;
      --bg-header: rgba(247, 245, 240, 0.92);
      --accent: #1B4F8A;
      --accent-mid: #2E6DB5;
      --accent-light: rgba(27, 79, 138, 0.08);
      --accent-glow: rgba(46, 109, 181, 0.2);
      --text-primary: #1C1C1E;
      --text-secondary: #6B6B6B;
      --text-tertiary: #AEAEB2;
      --border: #E2DFD8;
      --border-mid: #D1CDC4;
      --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 16px rgba(0,0,0,0.10), 0 1px 6px rgba(0,0,0,0.06);
      --source-36kr: #D94F3A;
      --source-v2ex: #1B4F8A;
      --source-stackoverflow: #D2682C;
      --source-tieba: #C89219;
      --source-lobsters: #8C2E1A;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-header);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 2rem;
    }
    .logo {
      font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .logo-mark {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-mark svg { width: 14px; height: 14px; color: white; }
    .logo .edition {
      font-size: 0.65rem;
      font-weight: 400;
      color: var(--text-tertiary);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Noto Sans SC', sans-serif;
      border-left: 1px solid var(--border-mid);
      padding-left: 0.6rem;
      margin-left: 0.1rem;
    }

    .header-center {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .date-stamp {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .header-stats {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .stat { display: flex; align-items: center; gap: 0.35rem; }
    .stat-value { color: var(--text-primary); font-weight: 500; }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--border-mid);
      color: var(--text-secondary);
      padding: 0.38rem 0.85rem;
      border-radius: 6px;
      font-size: 0.78rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg-card); border-color: var(--accent); color: var(--accent); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-mid); border-color: var(--accent-mid); color: white; }
    .kbd {
      background: var(--bg-page);
      border: 1px solid var(--border);
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      font-size: 0.65rem;
      font-family: monospace;
      color: var(--text-tertiary);
    }

    /* ── Main ── */
    .main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2.5rem 4rem;
    }

    /* ── Hero Featured ── */
    .hero {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 2rem;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: var(--shadow);
    }
    .hero:hover { box-shadow: var(--shadow-hover); border-color: var(--border-mid); }
    .hero.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow), var(--shadow-hover); }
    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 340px;
      min-height: 240px;
    }
    .hero-content { padding: 2rem 2rem 2rem 2.25rem; display: flex; flex-direction: column; justify-content: space-between; }
    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.85rem;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: var(--accent-light);
      color: var(--accent);
      padding: 0.25rem 0.65rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .hero-source {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .hero-source.v2ex { background: rgba(27,79,138,0.08); color: var(--source-v2ex); }
    .hero-source.kr { background: rgba(217,79,58,0.08); color: var(--source-36kr); }
    .hero-source.stackoverflow { background: rgba(210,104,44,0.08); color: var(--source-stackoverflow); }
    .hero-source.tieba { background: rgba(200,146,25,0.08); color: var(--source-tieba); }
    .hero-source.lobsters { background: rgba(140,46,26,0.08); color: var(--source-lobsters); }

    .hero-title {
      font-family: 'Playfair Display', 'Noto Serif SC', Georgia, serif;
      font-size: 1.65rem;
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.01em;
      color: var(--text-primary);
      margin-bottom: 0.85rem;
    }
    .hero-meta {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .hero-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .hero-image {
      background: linear-gradient(145deg, #EDE9E1 0%, #E2DDD5 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .hero-image-icon { font-size: 3rem; opacity: 0.35; font-family: 'Playfair Display', serif; font-style: italic; color: var(--text-secondary); }
    .hero-image-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-tertiary); }

    /* ── Section Divider ── */
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }
    .section-meta { font-size: 0.72rem; color: var(--text-tertiary); }

    /* ── Article Grid ── */
    .article-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .article-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      box-shadow: var(--shadow);
    }
    .article-card:hover { box-shadow: var(--shadow-hover); border-color: var(--border-mid); transform: translateY(-1px); }
    .article-card.selected { border-color: var(--accent); background: var(--accent-light); }
    .article-card-top { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .article-rank {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-tertiary);
      min-width: 24px;
    }
    .article-card.selected .article-rank { color: var(--accent); }

    .article-source-tag {
      display: inline-flex;
      align-items: center;
      padding: 0.18rem 0.5rem;
      border-radius: 4px;
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .article-source-tag.v2ex { background: rgba(27,79,138,0.08); color: var(--source-v2ex); }
    .article-source-tag.kr { background: rgba(217,79,58,0.08); color: var(--source-36kr); }
    .article-source-tag.stackoverflow { background: rgba(210,104,44,0.08); color: var(--source-stackoverflow); }
    .article-source-tag.tieba { background: rgba(200,146,25,0.08); color: var(--source-tieba); }
    .article-source-tag.lobsters { background: rgba(140,46,26,0.08); color: var(--source-lobsters); }

    .article-title {
      font-family: 'Playfair Display', 'Noto Serif SC', serif;
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.45;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .article-footer { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .article-stats { display: flex; align-items: center; gap: 0.75rem; font-size: 0.7rem; color: var(--text-tertiary); }
    .article-stat { display: flex; align-items: center; gap: 0.25rem; }
    .article-stat.score { color: var(--accent); }
    .article-bookmark {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 0.2rem;
      border-radius: 4px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }
    .article-bookmark:hover { color: var(--accent); background: var(--accent-light); }
    .article-bookmark.active { color: var(--accent); }

    /* ── Bottom Row: Sidebar + List ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 2rem;
    }

    /* ── Source Filter Bar ── */
    .source-filter {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 0;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }
    .source-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--text-secondary);
    }
    .source-chip:hover { border-color: var(--border-mid); color: var(--text-primary); }
    .source-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
    .source-chip .dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── Article List (left column) ── */
    .article-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .article-list-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.9rem 1rem;
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      box-shadow: var(--shadow);
    }
    .article-list-item:hover { box-shadow: var(--shadow-hover); border-color: var(--border-mid); background: var(--bg-card-hover); }
    .article-list-item.selected { border-color: var(--accent); background: var(--accent-light); }
    .list-rank {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-tertiary);
      min-width: 32px;
      text-align: center;
    }
    .article-list-item.selected .list-rank { color: var(--accent); }
    .list-body { flex: 1; min-width: 0; }
    .list-title {
      font-family: 'Playfair Display', 'Noto Serif SC', serif;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.4;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 0.3rem;
    }
    .list-meta { display: flex; align-items: center; gap: 0.75rem; font-size: 0.7rem; color: var(--text-tertiary); }
    .list-bookmark {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 0.2rem;
      border-radius: 4px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }
    .list-bookmark:hover { color: var(--accent); }
    .list-bookmark.active { color: var(--accent); }

    /* ── Sidebar ── */
    .sidebar { display: flex; flex-direction: column; gap: 1.25rem; }
    .sidebar-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .sidebar-card-header {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      font-family: 'Playfair Display', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-card-body { padding: 0.5rem; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.6rem 0.75rem;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 0.8rem;
    }
    .sidebar-item:hover { background: var(--bg-page); }
    .sidebar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .sidebar-item-name { flex: 1; color: var(--text-secondary); }
    .sidebar-item-count { font-size: 0.72rem; color: var(--text-tertiary); }

    /* Bookmarks sidebar */
    .bookmark-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.65rem 0.75rem;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .bookmark-item:hover { background: var(--bg-page); }
    .bookmark-item svg { color: var(--accent); flex-shrink: 0; margin-top: 2px; }
    .bookmark-item-text { flex: 1; font-size: 0.78rem; color: var(--text-primary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .bookmark-remove { background: none; border: none; color: var(--text-tertiary); cursor: pointer; padding: 0.15rem; border-radius: 3px; opacity: 0; transition: opacity 0.15s; }
    .bookmark-item:hover .bookmark-remove { opacity: 1; }
    .bookmark-remove:hover { color: #D94F3A; }

    /* ── Keyboard nav hint ── */
    .keyboard-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 0.5rem 1.25rem;
      border-radius: 24px;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--text-tertiary);
      box-shadow: var(--shadow);
      z-index: 50;
    }
    .keyboard-hint span { display: flex; align-items: center; gap: 0.3rem; }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 4rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      pointer-events: none;
    }
    .toast {
      background: var(--text-primary);
      color: white;
      padding: 0.6rem 1.1rem;
      border-radius: 7px;
      font-size: 0.82rem;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      animation: toastIn 0.25s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toast.success { background: #2D7D46; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Focus mode indicator ── */
    .focus-indicator {
      display: none;
      position: fixed;
      top: 76px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent);
      color: white;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-size: 0.75rem;
      z-index: 99;
    }
    .focus-indicator.active { display: flex; align-items: center; gap: 0.4rem; }

    /* ── Focus mode ── */
    .layout.focus-mode .sidebar { display: none; }
    .layout.focus-mode .bottom-row { grid-template-columns: 1fr; }
    .layout.focus-mode .article-grid { display: none; }
    .layout.focus-mode .section-header { display: none; }
    .layout.focus-mode .hero { display: none; }
    .focus-indicator { display: none; }

    /* ── Skeleton ── */
    .skeleton {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg-page) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-hero { height: 260px; border-radius: 14px; margin-bottom: 2rem; }
    .skeleton-card { height: 160px; border-radius: 10px; }
    .skeleton-row { height: 64px; border-radius: 8px; margin-bottom: 0.6rem; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-mid); }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .article-grid { grid-template-columns: repeat(2, 1fr); }
      .hero-inner { grid-template-columns: 1fr; }
      .hero-image { display: none; }
      .bottom-row { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
    @media (max-width: 640px) {
      .header { padding: 0 1rem; }
      .header-stats { display: none; }
      .header-center { display: none; }
      .main { padding: 1rem; }
      .article-grid { grid-template-columns: 1fr; }
      .keyboard-hint { display: none; }
      .btn span { display: none; }
      .hero-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="4"/>
            <line x1="12" y1="2" x2="12" y2="6"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/>
            <line x1="18" y1="12" x2="22" y2="12"/>
          </svg>
        </div>
        Focus
        <span class="edition">每日文摘</span>
      </div>

      <div class="header-center">
        <span class="date-stamp" id="dateStamp"></span>
      </div>

      <div class="header-stats">
        <div class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="lastUpdated">加载中…</span>
        </div>
        <div class="stat">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          <span class="stat-value" id="savedCount">0</span>
          <span>已收藏</span>
        </div>
      </div>

      <div class="header-actions">
        <button class="btn btn-primary" onclick="toggleFocusMode()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
          <span>专注</span>
          <kbd>F</kbd>
        </button>
      </div>
    </div>
  </header>

  <div class="focus-indicator" id="focusIndicator">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>
    专注模式
  </div>

  <main class="main">
    <!-- Skeleton -->
    <div id="skeletonLoader">
      <div class="skeleton skeleton-hero"></div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0.6rem">
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
      </div>
    </div>

    <!-- Hero -->
    <div id="featuredArticle"></div>

    <!-- 3-col grid -->
    <div id="articleGrid" class="article-grid"></div>

    <!-- Bottom: list + sidebar -->
    <div class="bottom-row" id="bottomRow">
      <div>
        <div class="section-header">
          <span class="section-title">全部内容</span>
          <span class="section-meta" id="listCount"></span>
        </div>
        <div class="article-list" id="articleList"></div>
      </div>
      <aside class="sidebar">
        <div class="sidebar-card">
          <div class="sidebar-card-header">
            来源分布
            <span id="sourceCountMeta" style="font-size:0.7rem;color:var(--text-tertiary);font-family:'Noto Sans SC',sans-serif;font-weight:400"></span>
          </div>
          <div class="sidebar-card-body" id="sourceStats"></div>
        </div>
        <div class="sidebar-card">
          <div class="sidebar-card-header">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            我的收藏
          </div>
          <div class="sidebar-card-body" id="bookmarkList"></div>
        </div>
      </aside>
    </div>
  </main>

  <div class="keyboard-hint">
    <span><kbd>J</kbd><kbd>K</kbd> 导航</span>
    <span><kbd>Enter</kbd> 打开</span>
    <span><kbd>B</kbd> 收藏</span>
    <span><kbd>F</kbd> 专注</span>
    <span><kbd>/</kbd> 搜索</span>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const SOURCES = {
      '36kr': { name: '36Kr', cls: 'kr', color: '#D94F3A' },
      'v2ex': { name: 'V2EX', cls: 'v2ex', color: '#1B4F8A' },
      'stackoverflow': { name: 'Stack Overflow', cls: 'stackoverflow', color: '#D2682C' },
      'tieba': { name: '贴吧', cls: 'tieba', color: '#C89219' },
      'lobsters': { name: 'Lobsters', cls: 'lobsters', color: '#8C2E1A' }
    };

    let articles = [];
    let filteredArticles = [];
    let selectedIndex = 0;
    let bookmarks = JSON.parse(localStorage.getItem('focusBookmarks') || '[]');
    let isFocusMode = false;

    // Set date stamp
    (function setDate() {
      const now = new Date();
      const days = ['周日','周一','周二','周三','周四','周五','周六'];
      const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
      document.getElementById('dateStamp').textContent =
        `${months[now.getMonth()]}${now.getDate()}日 ${days[now.getDay()]} · ${now.getFullYear()}`;
    })();

    async function loadData() {
      const files = ['36kr.json','v2ex.json','stackoverflow.json','tieba.json','lobsters.json'];
      const map = { '36kr.json':'36kr','v2ex.json':'v2ex','stackoverflow.json':'stackoverflow','tieba.json':'tieba','lobsters.json':'lobsters' };
      try {
        const results = await Promise.all(files.map(f => fetch(f).then(r => r.json()).catch(() => [])));
        results.forEach((data, i) => {
          const src = map[files[i]];
          data.forEach(item => articles.push({ ...item, source: src, id: item.url || `${src}-${item.rank||item.id}` }));
        });
        articles.sort((a, b) => (a.rank||99) - (b.rank||99));
        filteredArticles = [...articles];
        document.getElementById('lastUpdated').textContent = `更新于 ${new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}`;
      } catch(e) {
        showToast('数据加载失败', 'error');
      }
      renderUI();
    }

    function renderUI() {
      document.getElementById('skeletonLoader').style.display = 'none';
      renderHero();
      renderGrid();
      renderList();
      renderSidebar();
      renderBookmarks();
      updateStats();
    }

    function renderHero() {
      const f = filteredArticles[0];
      if (!f) return;
      const el = document.getElementById('featuredArticle');
      const sc = SOURCES[f.source] || {};
      el.innerHTML = `
        <div class="hero ${selectedIndex===0?'selected':''}" onclick="openArticle(0)">
          <div class="hero-inner">
            <div class="hero-content">
              <div class="hero-eyebrow">
                <span class="hero-badge">
                  <svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                  今日精选
                </span>
                <span class="hero-source ${sc.cls}">${sc.name||f.source}</span>
              </div>
              <h1 class="hero-title">${f.title}</h1>
              <div class="hero-meta">
                ${f.score!==undefined?`<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${f.score}</span>`:''}
                ${f.answers!==undefined?`<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${f.answers} 回答</span>`:''}
                ${f.replies!==undefined?`<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${f.replies} 回复</span>`:''}
                ${f.discussions!==undefined?`<span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${f.discussions} 讨论</span>`:''}
                <span style="margin-left:auto;display:flex;align-items:center;gap:0.3rem">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                  阅读原文
                </span>
              </div>
            </div>
            <div class="hero-image">
              <div class="hero-image-icon">${sc.name||''}</div>
              <div class="hero-image-label">${(sc.name||f.source).toUpperCase()}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderGrid() {
      const items = filteredArticles.slice(1, 7);
      const el = document.getElementById('articleGrid');
      el.innerHTML = items.map((a, i) => {
        const idx = i + 1;
        const sc = SOURCES[a.source]||{};
        const bk = bookmarks.some(b => b.id === a.id);
        return `
          <div class="article-card ${selectedIndex===idx?'selected':''}" data-index="${idx}" onclick="openArticle(${idx})">
            <div class="article-card-top">
              <span class="article-rank">${a.rank||idx}</span>
              <span class="article-source-tag ${sc.cls}">${sc.name||a.source}</span>
            </div>
            <div class="article-title">${a.title}</div>
            <div class="article-footer">
              <div class="article-stats">
                ${a.score!==undefined?`<span class="article-stat score"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${a.score}</span>`:''}
                ${a.answers!==undefined?`<span class="article-stat"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${a.answers}</span>`:''}
                ${a.replies!==undefined?`<span class="article-stat"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${a.replies}</span>`:''}
                ${a.node?`<span class="article-stat">${a.node}</span>`:''}
              </div>
              <button class="article-bookmark ${bk?'active':''}" onclick="event.stopPropagation();toggleBookmark(${idx})">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="${bk?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderList() {
      const items = filteredArticles.slice(7);
      const startIdx = 7;
      const el = document.getElementById('articleList');
      document.getElementById('listCount').textContent = `${items.length} 条内容`;
      el.innerHTML = items.map((a, i) => {
        const idx = startIdx + i;
        const sc = SOURCES[a.source]||{};
        const bk = bookmarks.some(b => b.id === a.id);
        return `
          <div class="article-list-item ${selectedIndex===idx?'selected':''}" data-index="${idx}" onclick="openArticle(${idx})">
            <div class="list-rank">${a.rank||idx}</div>
            <div class="list-body">
              <div class="list-title">${a.title}</div>
              <div class="list-meta">
                <span class="article-source-tag ${sc.cls}" style="font-size:0.58rem">${sc.name||a.source}</span>
                ${a.score!==undefined?`<span class="article-stat score"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${a.score}</span>`:''}
                ${a.replies!==undefined?`<span class="article-stat"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${a.replies}</span>`:''}
              </div>
            </div>
            <button class="list-bookmark ${bk?'active':''}" onclick="event.stopPropagation();toggleBookmark(${idx})">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="${bk?'currentColor':'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            </button>
          </div>
        `;
      }).join('');
    }

    function renderSidebar() {
      const counts = {};
      filteredArticles.forEach(a => counts[a.source] = (counts[a.source]||0)+1);
      const el = document.getElementById('sourceStats');
      document.getElementById('sourceCountMeta').textContent = `${filteredArticles.length} 条`;
      el.innerHTML = Object.entries(counts).map(([src, count]) => {
        const sc = SOURCES[src]||{};
        return `
          <div class="sidebar-item" onclick="filterBySource('${src}')">
            <span class="sidebar-dot" style="background:${sc.color}"></span>
            <span class="sidebar-item-name">${sc.name||src}</span>
            <span class="sidebar-item-count">${count}</span>
          </div>
        `;
      }).join('');
    }

    function renderBookmarks() {
      const el = document.getElementById('bookmarkList');
      if (!bookmarks.length) {
        el.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text-tertiary);font-size:0.78rem">暂无收藏，<kbd style="background:var(--bg-page);border:1px solid var(--border);padding:0.1rem 0.35rem;border-radius:3px;font-size:0.65rem">B</kbd> 键收藏</div>';
        return;
      }
      el.innerHTML = bookmarks.map(b => `
        <div class="bookmark-item" onclick="openBookmark('${b.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          <span class="bookmark-item-text">${b.title}</span>
          <button class="bookmark-remove" onclick="event.stopPropagation();removeBookmark('${b.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      `).join('');
    }

    function updateStats() {
      document.getElementById('savedCount').textContent = bookmarks.length;
    }

    function openArticle(index) {
      selectedIndex = index;
      const a = filteredArticles[index];
      if (!a) return;
      markAsRead(a.id);
      window.open(a.url, '_blank');
      renderHero();
      renderGrid();
      renderList();
    }

    function markAsRead(id) {
      let read = JSON.parse(localStorage.getItem('focusRead')||'[]');
      if (!read.includes(id)) { read.push(id); localStorage.setItem('focusRead',JSON.stringify(read)); }
    }

    function toggleBookmark(index) {
      const a = filteredArticles[index];
      if (!a) return;
      const ex = bookmarks.findIndex(b => b.id === a.id);
      if (ex >= 0) { bookmarks.splice(ex,1); showToast('已取消收藏'); }
      else { bookmarks.push({id:a.id,title:a.title,url:a.url,source:a.source}); showToast('已收藏','success'); }
      localStorage.setItem('focusBookmarks',JSON.stringify(bookmarks));
      renderGrid();
      renderList();
      renderBookmarks();
      updateStats();
    }

    function removeBookmark(id) {
      bookmarks = bookmarks.filter(b => b.id !== id);
      localStorage.setItem('focusBookmarks',JSON.stringify(bookmarks));
      renderGrid();
      renderList();
      renderBookmarks();
      updateStats();
      showToast('已移除收藏');
    }

    function openBookmark(id) {
      const a = filteredArticles.find(x => x.id === id);
      if (a) { selectedIndex = filteredArticles.indexOf(a); window.open(a.url,'_blank'); markAsRead(id); renderHero(); renderGrid(); renderList(); }
    }

    function filterBySource(src) {
      filteredArticles = src==='all' ? [...articles] : articles.filter(a => a.source===src);
      selectedIndex = 0;
      renderHero();
      renderGrid();
      renderList();
      renderSidebar();
    }

    function toggleFocusMode() {
      isFocusMode = !isFocusMode;
      document.getElementById('bottomRow').classList.toggle('focus-mode', isFocusMode);
      document.getElementById('focusIndicator').classList.toggle('active', isFocusMode);
      showToast(isFocusMode?'专注模式':'已退出专注模式');
    }

    function showToast(msg, type='') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = type==='success' ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>${msg}` : msg;
      c.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }

    function navigate(dir) {
      const max = filteredArticles.length - 1;
      selectedIndex = Math.max(0, Math.min(max, selectedIndex + dir));
      const el = document.querySelector(`[data-index="${selectedIndex}"]`) || document.querySelector('.hero') || document.querySelector('.article-card');
      el?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      renderHero();
      renderGrid();
      renderList();
    }

    function copyLink() {
      const a = filteredArticles[selectedIndex];
      if (a) { navigator.clipboard.writeText(a.url); showToast('链接已复制','success'); }
    }

    document.addEventListener('keydown', e => {
      if (e.key==='j'||e.key==='J'||e.key==='ArrowDown') navigate(1);
      else if (e.key==='k'||e.key==='K'||e.key==='ArrowUp') navigate(-1);
      else if (e.key==='Enter') openArticle(selectedIndex);
      else if (e.key==='b'||e.key==='B') toggleBookmark(selectedIndex);
      else if (e.key==='c'||e.key==='C') copyLink();
      else if (e.key==='f'||e.key==='F') toggleFocusMode();
      else if (e.key==='/') { e.preventDefault(); }
      else if (e.key==='Escape') { if (isFocusMode) toggleFocusMode(); }
    });

    loadData();
  </script>
</body>
</html>
