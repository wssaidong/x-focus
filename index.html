<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus — Editorial News Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0f1117;
      --bg-secondary: #161922;
      --bg-tertiary: #1c1f2a;
      --bg-hover: #242836;
      --accent: #00d4aa;
      --accent-dim: rgba(0, 212, 170, 0.15);
      --accent-glow: rgba(0, 212, 170, 0.4);
      --text-primary: #f0f0f0;
      --text-secondary: #a0a0a0;
      --text-tertiary: #666;
      --border: #2a2d3a;
      --border-light: #363a4a;
      --source-36kr: #ff6b6b;
      --source-v2ex: #0078d4;
      --source-stackoverflow: #f48024;
      --source-tieba: #ffd700;
      --source-lobsters: #ac130d;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
    }

    html { font-size: 16px; }
    body {
      font-family: 'Source Sans 3', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 17, 23, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo svg { width: 28px; height: 28px; }
    .header-stats {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .stat {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .stat-value { color: var(--text-primary); font-weight: 500; }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .btn {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: all 0.2s;
    }
    .btn:hover { background: var(--bg-hover); border-color: var(--border-light); }
    .btn-accent { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .btn-accent:hover { background: var(--accent); color: var(--bg-primary); }
    .kbd {
      background: var(--bg-primary);
      border: 1px solid var(--border);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-family: monospace;
    }

    /* Command Palette */
    .cmd-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 15vh;
    }
    .cmd-overlay.active { display: flex; }
    .cmd-palette {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .cmd-input-wrap {
      display: flex;
      align-items: center;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      gap: 0.75rem;
    }
    .cmd-input-wrap svg { color: var(--text-tertiary); flex-shrink: 0; }
    .cmd-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
      font-family: inherit;
    }
    .cmd-input::placeholder { color: var(--text-tertiary); }
    .cmd-results { max-height: 360px; overflow-y: auto; padding: 0.5rem; }
    .cmd-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .cmd-item:hover, .cmd-item.selected { background: var(--bg-hover); }
    .cmd-item-icon {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cmd-item-text { flex: 1; min-width: 0; }
    .cmd-item-title {
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cmd-item-meta { font-size: 0.75rem; color: var(--text-tertiary); }
    .cmd-section { padding: 0.5rem 1rem 0.25rem; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); }
    .cmd-footer {
      border-top: 1px solid var(--border);
      padding: 0.6rem 1rem;
      display: flex;
      gap: 1rem;
      font-size: 0.7rem;
      color: var(--text-tertiary);
    }

    /* Main Layout */
    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    .layout { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
    .layout.focus-mode { grid-template-columns: 1fr; }

    /* Featured Article */
    .featured {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
      cursor: pointer;
      transition: all 0.3s;
    }
    .featured:hover { border-color: var(--border-light); box-shadow: var(--shadow); }
    .featured.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-lg); }
    .featured-image {
      height: 320px;
      background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-hover) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .featured-image::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(15,17,23,0.8) 100%);
    }
    .featured-badge {
      position: absolute;
      top: 1.25rem;
      left: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: var(--bg-primary);
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .featured-content { padding: 1.5rem; }
    .featured-source {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .featured-source.v2ex { background: rgba(0,120,212,0.15); color: var(--source-v2ex); }
    .featured-source.stackoverflow { background: rgba(244,128,36,0.15); color: var(--source-stackoverflow); }
    .featured-source.kr { background: rgba(255,107,107,0.15); color: var(--source-36kr); }
    .featured-source.tieba { background: rgba(255,215,0,0.15); color: var(--source-tieba); }
    .featured-source.lobsters { background: rgba(172,19,13,0.15); color: var(--source-lobsters); }
    .featured-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.75rem;
      letter-spacing: -0.01em;
    }
    .featured-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .featured-meta span { display: flex; align-items: center; gap: 0.3rem; }

    /* Article List */
    .article-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .article-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      gap: 1rem;
    }
    .article-card:hover { background: var(--bg-tertiary); border-color: var(--border-light); }
    .article-card.selected { border-color: var(--accent); background: var(--accent-dim); }
    .article-rank {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--text-tertiary);
      min-width: 36px;
    }
    .article-card.selected .article-rank { color: var(--accent); }
    .article-body { flex: 1; min-width: 0; }
    .article-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 500;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .article-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }
    .article-stat { display: flex; align-items: center; gap: 0.3rem; }
    .article-stat.score { color: var(--accent); }
    .article-bookmark {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .article-bookmark:hover { color: var(--accent); }
    .article-bookmark.active { color: var(--accent); }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
    .sidebar-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .sidebar-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-content { padding: 0.75rem; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .sidebar-item:hover { background: var(--bg-hover); }
    .sidebar-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .sidebar-item-text { flex: 1; font-size: 0.9rem; }
    .sidebar-item-count { font-size: 0.8rem; color: var(--text-tertiary); }

    /* Bookmarks */
    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .bookmark-item:hover { background: var(--bg-hover); }
    .bookmark-item svg { color: var(--accent); flex-shrink: 0; }
    .bookmark-item-text { flex: 1; font-size: 0.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .bookmark-remove {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 0.25rem;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .bookmark-item:hover .bookmark-remove { opacity: 1; }
    .bookmark-remove:hover { color: #ff6b6b; }

    /* Updated Time */
    .updated-time {
      text-align: center;
      padding: 1rem;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }
    .toast {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.9rem;
      box-shadow: var(--shadow);
      animation: toastIn 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .toast.success { border-color: var(--accent); }
    .toast.success svg { color: var(--accent); }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-hover) 50%, var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .skeleton-featured { height: 420px; border-radius: 16px; margin-bottom: 2rem; }
    .skeleton-card { height: 100px; border-radius: 12px; margin-bottom: 0.75rem; }
    .skeleton-sidebar { height: 200px; border-radius: 12px; }

    /* Focus Mode */
    .layout.focus-mode .sidebar { display: none; }
    .layout.focus-mode .featured { display: none; }
    .layout.focus-mode .article-card { background: var(--bg-primary); }
    .focus-indicator {
      display: none;
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      font-size: 0.8rem;
      z-index: 99;
    }
    .focus-indicator.active { display: flex; align-items: center; gap: 0.5rem; }

    /* Keyboard hints */
    .keyboard-nav-hint {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: var(--text-tertiary);
      z-index: 50;
    }
    .keyboard-nav-hint span { display: flex; align-items: center; gap: 0.25rem; }

    /* Responsive */
    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
    @media (max-width: 640px) {
      .header { padding: 0 1rem; }
      .header-stats { display: none; }
      .main { padding: 1rem; }
      .featured-title { font-size: 1.35rem; }
      .featured-image { height: 220px; }
      .keyboard-nav-hint { display: none; }
      .btn span { display: none; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="6"/>
          <circle cx="12" cy="12" r="2"/>
        </svg>
        Focus
      </div>
      <div class="header-stats">
        <div class="stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          <span>Reading:</span>
          <span class="stat-value" id="readCount">0</span>
        </div>
        <div class="stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          <span>Saved:</span>
          <span class="stat-value" id="savedCount">0</span>
        </div>
        <div class="stat">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="lastUpdated">Loading...</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="openCommandPalette()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span>Search</span>
          <kbd>⌘K</kbd>
        </button>
        <button class="btn btn-accent" onclick="toggleFocusMode()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Focus</span>
          <kbd>F</kbd>
        </button>
      </div>
    </div>
  </header>

  <div class="focus-indicator" id="focusIndicator">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    Focus Mode
  </div>

  <main class="main">
    <div class="layout" id="mainLayout">
      <div class="content">
        <div id="skeletonLoader">
          <div class="skeleton skeleton-featured"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
          <div class="skeleton skeleton-card"></div>
        </div>
        <div id="featuredArticle"></div>
        <div class="article-list" id="articleList"></div>
      </div>
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">
            Sources
            <span id="sourceCount" style="font-size:0.8rem;color:var(--text-tertiary)">0 items</span>
          </div>
          <div class="sidebar-content" id="sourceStats"></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Bookmarks
          </div>
          <div class="sidebar-content" id="bookmarkList"></div>
        </div>
      </aside>
    </div>
  </main>

  <div class="keyboard-nav-hint">
    <span><kbd>J</kbd>/<kbd>K</kbd> Navigate</span>
    <span><kbd>Enter</kbd> Open</span>
    <span><kbd>B</kbd> Bookmark</span>
    <span><kbd>C</kbd> Copy Link</span>
    <span><kbd>F</kbd> Focus</span>
    <span><kbd>Esc</kbd> Close</span>
  </div>

  <div class="cmd-overlay" id="cmdOverlay" onclick="if(event.target===this)closeCommandPalette()">
    <div class="cmd-palette">
      <div class="cmd-input-wrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="cmd-input" id="cmdInput" placeholder="Search articles, sources, bookmarks..." oninput="filterCommands()">
      </div>
      <div class="cmd-results" id="cmdResults"></div>
      <div class="cmd-footer">
        <span><kbd>↑↓</kbd> Navigate</span>
        <span><kbd>Enter</kbd> Select</span>
        <span><kbd>Esc</kbd> Close</span>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    const SOURCES = {
      '36kr': { name: '36Kr', class: 'kr', color: '#ff6b6b' },
      'v2ex': { name: 'V2EX', class: 'v2ex', color: '#0078d4' },
      'stackoverflow': { name: 'Stack Overflow', class: 'stackoverflow', color: '#f48024' },
      'tieba': { name: 'Tieba', class: 'tieba', color: '#ffd700' },
      'lobsters': { name: 'Lobsters', class: 'lobsters', color: '#ac130d' }
    };

    let articles = [];
    let filteredArticles = [];
    let selectedIndex = 0;
    let bookmarks = JSON.parse(localStorage.getItem('focusBookmarks') || '[]');
    let readArticles = JSON.parse(localStorage.getItem('focusRead') || '[]');
    let isFocusMode = false;
    let cmdSelectedIndex = 0;
    let cmdItems = [];

    async function loadData() {
      const files = ['36kr.json', 'v2ex.json', 'stackoverflow.json', 'tieba.json', 'lobsters.json'];
      const sourceMap = { '36kr.json': '36kr', 'v2ex.json': 'v2ex', 'stackoverflow.json': 'stackoverflow', 'tieba.json': 'tieba', 'lobsters.json': 'lobsters' };

      try {
        const results = await Promise.all(files.map(f => fetch(f).then(r => r.json()).catch(() => [])));
        results.forEach((data, i) => {
          const source = sourceMap[files[i]];
          data.forEach(item => articles.push({ ...item, source, id: item.url || `${source}-${item.rank || item.id}` }));
        });
        articles.sort((a, b) => (a.rank || 99) - (b.rank || 99));
        filteredArticles = [...articles];
        document.getElementById('lastUpdated').textContent = `Updated: ${new Date().toLocaleTimeString()}`;
      } catch (e) {
        showToast('Failed to load data', 'error');
      }
      renderUI();
    }

    function renderUI() {
      document.getElementById('skeletonLoader').style.display = 'none';
      renderFeatured();
      renderArticleList();
      renderSidebar();
      renderBookmarks();
      updateStats();
    }

    function renderFeatured() {
      const featured = filteredArticles[0];
      if (!featured) return;
      const el = document.getElementById('featuredArticle');
      el.innerHTML = `
        <div class="featured ${selectedIndex === 0 ? 'selected' : ''}" onclick="openArticle(0)">
          <div class="featured-image">
            <div class="featured-badge">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
              Featured
            </div>
            <div style="font-family:'Playfair Display',serif;font-size:4rem;color:var(--text-tertiary);opacity:0.3">${SOURCES[featured.source]?.name || featured.source}</div>
          </div>
          <div class="featured-content">
            <span class="featured-source ${SOURCES[featured.source]?.class}">${SOURCES[featured.source]?.name || featured.source}</span>
            <h2 class="featured-title">${featured.title}</h2>
            <div class="featured-meta">
              ${featured.score !== undefined ? `<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${featured.score}</span>` : ''}
              ${featured.answers !== undefined ? `<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${featured.answers}</span>` : ''}
              ${featured.replies !== undefined ? `<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${featured.replies}</span>` : ''}
              ${featured.discussions !== undefined ? `<span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${featured.discussions}</span>` : ''}
              <span><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>Open article</span>
            </div>
          </div>
        </div>
      `;
    }

    function renderArticleList() {
      const list = document.getElementById('articleList');
      const items = filteredArticles.slice(1).map((article, i) => {
        const idx = i + 1;
        const isBookmarked = bookmarks.some(b => b.id === article.id);
        return `
          <div class="article-card ${selectedIndex === idx ? 'selected' : ''}" data-index="${idx}" onclick="openArticle(${idx})">
            <div class="article-rank">${article.rank || idx}</div>
            <div class="article-body">
              <div class="article-header">
                <span class="featured-source ${SOURCES[article.source]?.class}">${SOURCES[article.source]?.name || article.source}</span>
              </div>
              <h3 class="article-title">${article.title}</h3>
              <div class="article-footer">
                ${article.score !== undefined ? `<span class="article-stat score"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>${article.score}</span>` : ''}
                ${article.answers !== undefined ? `<span class="article-stat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${article.answers} answers</span>` : ''}
                ${article.replies !== undefined ? `<span class="article-stat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${article.replies} replies</span>` : ''}
                ${article.discussions !== undefined ? `<span class="article-stat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${article.discussions}</span>` : ''}
                ${article.node ? `<span class="article-stat"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.21 18.71l-7.04-7.04a3 3 0 1 0-4.24 4.24l7.04 7.04a3 3 0 0 0 4.24-4.24z"/><circle cx="16.5" cy="6.5" r="2"/></svg>${article.node}</span>` : ''}
                <button class="article-bookmark ${isBookmarked ? 'active' : ''}" onclick="event.stopPropagation();toggleBookmark(${idx})">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="${isBookmarked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
      list.innerHTML = items;
    }

    function renderSidebar() {
      const counts = {};
      filteredArticles.forEach(a => counts[a.source] = (counts[a.source] || 0) + 1);
      const stats = document.getElementById('sourceStats');
      stats.innerHTML = Object.entries(counts).map(([source, count]) => `
        <div class="sidebar-item" onclick="filterBySource('${source}')">
          <span class="sidebar-dot" style="background:${SOURCES[source]?.color}"></span>
          <span class="sidebar-item-text">${SOURCES[source]?.name || source}</span>
          <span class="sidebar-item-count">${count}</span>
        </div>
      `).join('');
      document.getElementById('sourceCount').textContent = `${filteredArticles.length} items`;
    }

    function renderBookmarks() {
      const el = document.getElementById('bookmarkList');
      if (bookmarks.length === 0) {
        el.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text-tertiary);font-size:0.85rem">No bookmarks yet. Press B to save.</div>';
        return;
      }
      el.innerHTML = bookmarks.map(b => `
        <div class="bookmark-item" onclick="openBookmark('${b.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          <span class="bookmark-item-text">${b.title}</span>
          <button class="bookmark-remove" onclick="event.stopPropagation();removeBookmark('${b.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      `).join('');
    }

    function updateStats() {
      document.getElementById('readCount').textContent = readArticles.length;
      document.getElementById('savedCount').textContent = bookmarks.length;
    }

    function openArticle(index) {
      selectedIndex = index;
      const article = filteredArticles[index];
      if (!article) return;
      markAsRead(article.id);
      window.open(article.url, '_blank');
      renderFeatured();
      renderArticleList();
    }

    function markAsRead(id) {
      if (!readArticles.includes(id)) {
        readArticles.push(id);
        localStorage.setItem('focusRead', JSON.stringify(readArticles));
        updateStats();
      }
    }

    function toggleBookmark(index) {
      const article = filteredArticles[index];
      if (!article) return;
      const existing = bookmarks.findIndex(b => b.id === article.id);
      if (existing >= 0) {
        bookmarks.splice(existing, 1);
        showToast('Removed from bookmarks');
      } else {
        bookmarks.push({ id: article.id, title: article.title, url: article.url, source: article.source });
        showToast('Added to bookmarks', 'success');
      }
      localStorage.setItem('focusBookmarks', JSON.stringify(bookmarks));
      renderBookmarks();
      renderArticleList();
      updateStats();
    }

    function removeBookmark(id) {
      bookmarks = bookmarks.filter(b => b.id !== id);
      localStorage.setItem('focusBookmarks', JSON.stringify(bookmarks));
      renderBookmarks();
      renderArticleList();
      updateStats();
      showToast('Removed from bookmarks');
    }

    function openBookmark(id) {
      const article = filteredArticles.find(a => a.id === id);
      if (article) {
        selectedIndex = filteredArticles.indexOf(article);
        window.open(article.url, '_blank');
        markAsRead(id);
        renderFeatured();
        renderArticleList();
      }
    }

    function filterBySource(source) {
      filteredArticles = source === 'all' ? [...articles] : articles.filter(a => a.source === source);
      selectedIndex = 0;
      renderFeatured();
      renderArticleList();
      renderSidebar();
    }

    function toggleFocusMode() {
      isFocusMode = !isFocusMode;
      document.getElementById('mainLayout').classList.toggle('focus-mode', isFocusMode);
      document.getElementById('focusIndicator').classList.toggle('active', isFocusMode);
      showToast(isFocusMode ? 'Focus mode enabled' : 'Focus mode disabled');
    }

    function copyShareUrl() {
      const article = filteredArticles[selectedIndex];
      if (article) {
        navigator.clipboard.writeText(article.url);
        showToast('Link copied to clipboard', 'success');
      }
    }

    function openCommandPalette() {
      document.getElementById('cmdOverlay').classList.add('active');
      document.getElementById('cmdInput').focus();
      buildCommandList();
    }

    function closeCommandPalette() {
      document.getElementById('cmdOverlay').classList.remove('active');
      document.getElementById('cmdInput').value = '';
    }

    function buildCommandList(filter = '') {
      const items = [];
      const lf = filter.toLowerCase();
      items.push({ type: 'action', title: 'Toggle Focus Mode', subtitle: 'Enable/disable focus mode', action: toggleFocusMode, icon: 'focus' });
      items.push({ type: 'action', title: 'Copy Share URL', subtitle: 'Copy current article link', action: copyShareUrl, icon: 'share' });
      items.push({ type: 'action', title: 'Show All Sources', subtitle: 'Clear source filter', action: () => filterBySource('all'), icon: 'all' });
      filteredArticles.forEach((a, i) => {
        if (!lf || a.title.toLowerCase().includes(lf) || SOURCES[a.source]?.name.toLowerCase().includes(lf)) {
          items.push({ type: 'article', title: a.title, subtitle: SOURCES[a.source]?.name || a.source, action: () => openArticle(i), icon: 'article' });
        }
      });
      if (lf && bookmarks.some(b => b.title.toLowerCase().includes(lf))) {
        bookmarks.filter(b => b.title.toLowerCase().includes(lf)).forEach(b => {
          items.push({ type: 'bookmark', title: b.title, subtitle: 'Bookmark', action: () => openBookmark(b.id), icon: 'bookmark' });
        });
      }
      cmdItems = items;
      cmdSelectedIndex = 0;
      renderCommandList();
    }

    function filterCommands() {
      buildCommandList(document.getElementById('cmdInput').value);
    }

    function renderCommandList() {
      const results = document.getElementById('cmdResults');
      const icons = {
        focus: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>',
        share: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>',
        all: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
        article: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
        bookmark: '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>'
      };
      results.innerHTML = cmdItems.map((item, i) => `
        <div class="cmd-item ${i === cmdSelectedIndex ? 'selected' : ''}" onclick="${item.action && `(${item.action})()`}">
          <div class="cmd-item-icon" style="background:var(--bg-tertiary);color:var(--text-secondary)">${icons[item.icon]}</div>
          <div class="cmd-item-text">
            <div class="cmd-item-title">${item.title}</div>
            <div class="cmd-item-meta">${item.subtitle}</div>
          </div>
        </div>
      `).join('');
    }

    function showToast(message, type = 'default') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = type === 'success' ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>${message}` : message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function navigate(direction) {
      const max = filteredArticles.length - 1;
      selectedIndex = Math.max(0, Math.min(max, selectedIndex + direction));
      const el = document.querySelector(`[data-index="${selectedIndex}"]`) || document.querySelector('.featured');
      el?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      renderFeatured();
      renderArticleList();
    }

    document.addEventListener('keydown', e => {
      if (document.getElementById('cmdOverlay').classList.contains('active')) {
        if (e.key === 'Escape') closeCommandPalette();
        else if (e.key === 'ArrowDown') { e.preventDefault(); cmdSelectedIndex = Math.min(cmdItems.length - 1, cmdSelectedIndex + 1); renderCommandList(); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); cmdSelectedIndex = Math.max(0, cmdSelectedIndex - 1); renderCommandList(); }
        else if (e.key === 'Enter' && cmdItems[cmdSelectedIndex]) { cmdItems[cmdSelectedIndex].action?.(); closeCommandPalette(); }
        return;
      }
      if (e.key === 'j' || e.key === 'ArrowDown') navigate(1);
      else if (e.key === 'k' || e.key === 'ArrowUp') navigate(-1);
      else if (e.key === 'Enter') openArticle(selectedIndex);
      else if (e.key === 'b' || e.key === 'B') toggleBookmark(selectedIndex);
      else if (e.key === 'c' || e.key === 'C') copyShareUrl();
      else if (e.key === 'f' || e.key === 'F') toggleFocusMode();
      else if (e.key === '/') { e.preventDefault(); openCommandPalette(); }
      else if (e.key === 'Escape') { closeCommandPalette(); if (isFocusMode) toggleFocusMode(); }
      else if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); openCommandPalette(); }
    });

    loadData();
  </script>
</body>
</html>
